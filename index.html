<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoWash RP</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f4f0; --surface:#fff; --border:rgba(0,0,0,.09); --border2:rgba(0,0,0,.15);
      --text:#1a1a18; --muted:#6b6b67;
      --green:#1a6b3c; --green-bg:#e8f5ee; --green-bd:#a8d8bc;
      --amber:#92510a; --amber-bg:#fdf0dc; --amber-bd:#e8c07a;
      --red:#8b1f1f;   --red-bg:#fdeaea;   --red-bd:#e8a0a0;
      --blue:#1a4a7a;  --blue-bg:#e8f0fa;  --blue-bd:#a0c0e8;
      --r:10px; --rl:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}

    /* LOGIN */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-box{width:100%;max-width:360px}
    .login-brand{text-align:center;margin-bottom:28px}
    .login-brand h1{font-size:24px;font-weight:600;margin-bottom:4px}
    .login-brand p{font-size:13px;color:var(--muted)}
    .login-error{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);border-radius:var(--r);padding:10px 14px;font-size:13px;margin-top:10px;display:none}

    /* TOPBAR */
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .brand{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
    .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .user-pill{font-size:12px;font-weight:500;padding:4px 12px;border-radius:99px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
    .user-pill.op{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}

    /* SHELL */
    .shell{max-width:900px;margin:0 auto;padding:20px 16px 60px}

    /* SYNC */
    .sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:16px}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
    .sync-dot.err{background:#e24b4a}

    /* TABS */
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:4px}
    .tab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
    .tab:hover{background:var(--bg);color:var(--text)}
    .tab.active{background:var(--text);color:#fff}
    .tab .cnt{background:var(--amber-bg);color:var(--amber);border-radius:99px;padding:0 6px;font-size:11px;line-height:18px}
    .tab.active .cnt{background:rgba(255,255,255,.2);color:#fff}
    .section{display:none}
    .section.active{display:block}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px}
    .card-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}

    /* METRICS */
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px}
    .metric-label{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
    .metric-val{font-size:24px;font-weight:600;font-family:'DM Mono',monospace}
    .metric-val.green{color:var(--green)}

    /* FORMS */
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px}
    .field input,.field select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s,box-shadow .15s}
    .field input:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);background:var(--surface)}

    /* BUTTONS */
    .btn{padding:9px 18px;border-radius:var(--r);border:1px solid var(--border2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--surface);color:var(--text)}
    .btn:hover{background:var(--bg)}
    .btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
    .btn-primary:hover{opacity:.88}
    .btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);font-size:13px;padding:6px 14px}
    .btn-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);font-size:13px;padding:6px 14px}
    .btn-sm{font-size:13px;padding:6px 14px}

    /* TABLE */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
    tbody td{padding:11px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover{background:var(--bg)}
    .td-actions{display:flex;gap:6px;flex-wrap:wrap}
    .total-row td{font-weight:600;font-family:'DM Mono',monospace;border-top:2px solid var(--border2)}

    /* BADGES */
    .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
    .badge-pend{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd)}
    .badge-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
    .badge-admin{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
    .badge-op{background:#f0edff;color:#4a3aaa;border:1px solid #c0b8f0}

    /* EMPTY */
    .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

    /* DATE NAV */
    .date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .date-label{font-size:15px;font-weight:600}

    /* MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);padding:24px;width:100%;max-width:380px}
    .modal h3{font-size:17px;font-weight:600;margin-bottom:16px}
    .modal-info{background:var(--bg);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.7}
    .modal-info strong{color:var(--text)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

    /* CONFIG */
    .config-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .config-row:last-child{border-bottom:none}
    .config-name{flex:1;font-size:14px}

    @media(max-width:600px){
      .tab{font-size:12px;padding:8px 2px}
      .metrics{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-brand">
      <h1>MotoWash RP</h1>
      <p>Sistema de órdenes y ventas</p>
    </div>
    <div class="card">
      <div class="field" style="margin-bottom:12px">
        <label>Usuario</label>
        <input id="l-user" type="text" placeholder="admin  ó  operario" autocomplete="username">
      </div>
      <div class="field" style="margin-bottom:16px">
        <label>Contraseña</label>
        <input id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Ingresar</button>
      <div class="login-error" id="l-err">Usuario o contraseña incorrectos.</div>
    </div>
    <p style="text-align:center;font-size:12px;color:var(--muted);margin-top:12px">
      Por defecto: <strong>admin / admin123</strong> &nbsp;·&nbsp; <strong>operario / moto123</strong>
    </p>
  </div>
</div>

<!-- MAIN -->
<div id="main-app" style="display:none">
  <div class="topbar">
    <div class="brand"><span class="brand-dot"></span>MotoWash RP</div>
    <div class="topbar-right">
      <span id="user-pill" class="user-pill"></span>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="shell">
    <div class="sync-bar">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Conectando...</span>
    </div>
    <div class="tabs" id="tabs-bar"></div>

    <!-- NUEVA -->
    <div id="tab-nueva" class="section">
      <div class="card">
        <div class="card-title">Nueva orden</div>
        <div class="form-grid">
          <div class="field"><label>Placa / ID</label><input id="n-placa" type="text" placeholder="ABC123" oninput="this.value=this.value.toUpperCase()"></div>
          <div class="field"><label>Tipo de vehículo</label>
            <select id="n-tipo"><option>Moto estándar</option><option>Moto deportiva</option><option>Scooter</option><option>ATV / Cuadrimoto</option></select>
          </div>
          <div class="field"><label>Servicio</label><select id="n-srv" onchange="syncPrecio()"></select></div>
          <div class="field"><label>Precio (COP $)</label><input id="n-precio" type="number" min="0" step="500"></div>
          <div class="field"><label>Notas</label><input id="n-notas" type="text" placeholder="Opcional..."></div>
        </div>
        <button class="btn btn-primary" onclick="crearOrden()">Crear orden pendiente</button>
      </div>
    </div>

    <!-- PENDIENTES -->
    <div id="tab-pendientes" class="section">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div class="card-title" style="margin:0">Órdenes pendientes</div>
          <button class="btn btn-sm" onclick="renderPendientes()">Actualizar</button>
        </div>
        <div class="table-wrap" id="tabla-pend"></div>
      </div>
    </div>

    <!-- CERRADAS -->
    <div id="tab-cerradas" class="section">
      <div class="date-nav">
        <button class="btn btn-sm" onclick="cambiarDia(-1)">← Anterior</button>
        <span class="date-label" id="fecha-cerradas"></span>
        <button class="btn btn-sm" onclick="cambiarDia(1)">Siguiente →</button>
        <button class="btn btn-sm" onclick="histFecha=hoy();renderCerradas()">Hoy</button>
      </div>
      <div class="card"><div class="table-wrap" id="tabla-cerradas"></div></div>
    </div>

    <!-- REPORTE -->
    <div id="tab-reporte" class="section">
      <div class="date-nav">
        <button class="btn btn-sm" onclick="cambiarDiaRep(-1)">← Anterior</button>
        <span class="date-label" id="fecha-reporte"></span>
        <button class="btn btn-sm" onclick="cambiarDiaRep(1)">Siguiente →</button>
        <button class="btn btn-sm" onclick="repFecha=hoy();renderReporte()">Hoy</button>
      </div>
      <div class="metrics" id="metricas-rep"></div>
      <div class="card">
        <div class="card-title">Detalle de ventas</div>
        <div class="table-wrap" id="tabla-rep"></div>
      </div>
    </div>

    <!-- CONFIG -->
    <div id="tab-config" class="section">
      <div class="card">
        <div class="card-title">Servicios y tarifas</div>
        <div id="lista-srvs"></div>
        <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
          <div class="field" style="flex:1;min-width:140px;margin:0"><input id="c-nombre" type="text" placeholder="Nombre del servicio"></div>
          <div class="field" style="width:120px;margin:0"><input id="c-precio" type="number" placeholder="Precio"></div>
          <button class="btn btn-primary" onclick="addSrv()">Agregar</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Cambiar contraseñas</div>
        <div class="form-grid">
          <div class="field"><label>Nueva clave — Administrador</label><input id="pw-admin" type="password" placeholder="••••••••"></div>
          <div class="field"><label>Nueva clave — Operario</label><input id="pw-op" type="password" placeholder="••••••••"></div>
        </div>
        <button class="btn btn-primary" onclick="guardarClaves()">Guardar contraseñas</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL COBRO -->
<div class="modal-bg" id="modal-pago">
  <div class="modal">
    <h3>Cobrar orden</h3>
    <div class="modal-info" id="modal-info"></div>
    <div class="field" style="margin-bottom:12px">
      <label>Método de pago</label>
      <select id="m-pago"><option>Efectivo</option><option>Nequi / Daviplata</option><option>Transferencia</option><option>Tarjeta</option></select>
    </div>
    <div class="field"><label>Precio final (COP $)</label><input id="m-precio" type="number" min="0" step="500"></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="cobrar()">Confirmar pago</button>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ── CONFIG ───────────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyAp5NCH-vV4RIUFuD3FQ0CRit-44_1gBHo",
  authDomain:        "motowash-rp.firebaseapp.com",
  databaseURL:       "https://motowash-rp-default-rtdb.firebaseio.com",
  projectId:         "motowash-rp",
  storageBucket:     "motowash-rp.firebasestorage.app",
  messagingSenderId: "1076586851362",
  appId:             "1:1076586851362:web:0205804af70f85c838ae7b"
});
var db = firebase.database();

// ── ESTADO ───────────────────────────────────────────────────
var ordenes     = [];
var servicios   = [];
var authCfg     = { admin: "admin123", operario: "moto123" };
var currentUser = null;
var histFecha   = hoy();
var repFecha    = hoy();
var pagoOrdenId = null;

// ── HELPERS ──────────────────────────────────────────────────
function hoy() { return new Date().toISOString().slice(0,10); }
function hora() { return new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}); }
function fmt(n) { return "$" + Number(n).toLocaleString("es-CO"); }
function fmtF(d) {
  var p = d.split("-"), ms = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return p[2]+" "+ms[+p[1]-1]+" "+p[0];
}
function nextNum() {
  if (!ordenes.length) return 1;
  return Math.max.apply(null, ordenes.map(function(o){ return o.num||0; })) + 1;
}
function setSyncStatus(ok) {
  var dot = document.getElementById("sync-dot");
  var lbl = document.getElementById("sync-label");
  if (!dot) return;
  dot.className = "sync-dot" + (ok ? "" : " err");
  lbl.textContent = ok ? "Datos en tiempo real · Conectado" : "Sin conexión con Firebase";
}

// ── FIREBASE OPERACIONES ─────────────────────────────────────
function guardarOrden(o)    { return db.ref("/ordenes/"+o.id).set(o); }
function eliminarOrden(id)  { return db.ref("/ordenes/"+id).remove(); }
function guardarServicios() {
  var obj = {};
  servicios.forEach(function(s){ obj[s.id] = s; });
  return db.ref("/servicios").set(obj);
}
function guardarAuth() { return db.ref("/auth").set(authCfg); }

function startListening() {
  db.ref("/").on("value", function(snap) {
    var data = snap.val() || {};
    ordenes   = Object.values(data.ordenes   || {});
    servicios = Object.values(data.servicios || {});
    authCfg   = data.auth || { admin:"admin123", operario:"moto123" };
    if (!servicios.length) {
      servicios = [
        {id:"s1",nombre:"Lavado básico",precio:8000},
        {id:"s2",nombre:"Lavado completo",precio:15000},
        {id:"s3",nombre:"Lavado + Encerado",precio:22000},
        {id:"s4",nombre:"Lavado motor",precio:25000},
        {id:"s5",nombre:"Detailing completo",precio:45000}
      ];
      guardarServicios();
    }
    setSyncStatus(true);
    poblarSelect();
    refreshCurrentTab();
    updateBadge();
  }, function(){ setSyncStatus(false); });
}

// ── LOGIN / LOGOUT ───────────────────────────────────────────
function doLogin() {
  var user = document.getElementById("l-user").value.trim().toLowerCase();
  var pass = document.getElementById("l-pass").value;
  var err  = document.getElementById("l-err");
  db.ref("/auth").once("value").then(function(snap) {
    if (snap.exists()) authCfg = snap.val();
    var ok = (user==="admin" && pass===authCfg.admin) ||
             (user==="operario" && pass===authCfg.operario);
    if (ok) {
      currentUser = user;
      err.style.display = "none";
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("main-app").style.display     = "block";
      setupTabs();
      startListening();
    } else {
      err.style.display = "block";
    }
  }).catch(function() {
    err.textContent = "Error de conexión con Firebase. Verifica tu configuración.";
    err.style.display = "block";
  });
}

function doLogout() {
  db.ref("/").off();
  currentUser = null;
  document.getElementById("main-app").style.display     = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("l-pass").value = "";
}

// ── TABS ─────────────────────────────────────────────────────
function setupTabs() {
  var pill    = document.getElementById("user-pill");
  var isAdmin = currentUser === "admin";
  pill.textContent = isAdmin ? "Administrador" : "Operario";
  pill.className   = isAdmin ? "user-pill" : "user-pill op";
  var bar  = document.getElementById("tabs-bar");
  bar.innerHTML = "";
  var defs = [
    {id:"nueva",     lbl:"Nueva orden",   admin:false},
    {id:"pendientes",lbl:"Pendientes",     admin:false, badge:true},
    {id:"cerradas",  lbl:"Cerradas",       admin:false},
    {id:"reporte",   lbl:"Reporte diario", admin:false},
    {id:"config",    lbl:"Configuración",  admin:true}
  ];
  defs.forEach(function(d) {
    if (d.admin && !isAdmin) return;
    var b = document.createElement("button");
    b.className = "tab";
    b.id = "tab-btn-"+d.id;
    b.innerHTML = d.lbl + (d.badge ? '<span class="cnt" id="badge-pend">0</span>' : "");
    b.onclick = function(){ showTab(d.id); };
    bar.appendChild(b);
  });
  showTab("nueva");
}

function showTab(t) {
  document.querySelectorAll(".section").forEach(function(s){ s.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("active"); });
  var sec = document.getElementById("tab-"+t);
  var btn = document.getElementById("tab-btn-"+t);
  if (sec) sec.classList.add("active");
  if (btn) btn.classList.add("active");
  if (t==="pendientes") renderPendientes();
  if (t==="cerradas")   renderCerradas();
  if (t==="reporte")    renderReporte();
  if (t==="config")     renderConfig();
}

function refreshCurrentTab() {
  var active = document.querySelector(".section.active");
  if (!active) return;
  var id = active.id.replace("tab-","");
  if (id==="pendientes") renderPendientes();
  if (id==="cerradas")   renderCerradas();
  if (id==="reporte")    renderReporte();
}

function updateBadge() {
  var b = document.getElementById("badge-pend");
  if (b) b.textContent = ordenes.filter(function(o){ return o.estado==="pendiente"; }).length;
}

// ── SERVICIOS ────────────────────────────────────────────────
function syncPrecio() {
  var sel = document.getElementById("n-srv");
  var idx = sel ? sel.selectedIndex : -1;
  if (servicios[idx]) document.getElementById("n-precio").value = servicios[idx].precio;
}

function poblarSelect() {
  var sel = document.getElementById("n-srv");
  if (!sel) return;
  var prev = sel.value;
  sel.innerHTML = "";
  servicios.forEach(function(s) {
    var o = document.createElement("option");
    o.value = s.id;
    o.textContent = s.nombre;
    sel.appendChild(o);
  });
  if (prev) sel.value = prev;
  syncPrecio();
}

// ── CREAR ORDEN ──────────────────────────────────────────────
function crearOrden() {
  var placa = document.getElementById("n-placa").value.trim();
  if (!placa) { alert("Ingresa la placa o ID del vehículo"); return; }
  var sel    = document.getElementById("n-srv");
  var srvObj = servicios[sel.selectedIndex] || {};
  var precio = parseInt(document.getElementById("n-precio").value) || 0;
  var id     = Date.now().toString();
  var orden  = {
    id: id, num: nextNum(), fecha: hoy(), horaApertura: hora(),
    creadoPor: currentUser, placa: placa,
    tipo: document.getElementById("n-tipo").value,
    servicio: srvObj.nombre || "", precio: precio,
    notas: document.getElementById("n-notas").value,
    estado: "pendiente", metodoPago: null,
    horaCierre: null, fechaCierre: null, cerradoPor: null
  };
  guardarOrden(orden).then(function() {
    document.getElementById("n-placa").value = "";
    document.getElementById("n-notas").value = "";
    alert("Orden #"+orden.num+" creada para "+placa+" — pendiente de pago.");
  });
}

// ── COBRAR ───────────────────────────────────────────────────
function abrirModal(id) {
  var o = ordenes.find(function(x){ return x.id===id; });
  if (!o) return;
  pagoOrdenId = id;
  document.getElementById("modal-info").innerHTML =
    "<strong>Orden #"+o.num+"</strong> &nbsp;·&nbsp; "+o.placa+"<br>"+o.tipo+" &nbsp;·&nbsp; "+o.servicio+"<br>Entrada: "+o.horaApertura;
  document.getElementById("m-precio").value = o.precio;
  document.getElementById("modal-pago").classList.add("open");
}

function cerrarModal() {
  document.getElementById("modal-pago").classList.remove("open");
  pagoOrdenId = null;
}

function cobrar() {
  var o = ordenes.find(function(x){ return x.id===pagoOrdenId; });
  if (!o) return;
  var updated = Object.assign({}, o, {
    estado: "cerrada",
    metodoPago: document.getElementById("m-pago").value,
    precio: parseInt(document.getElementById("m-precio").value) || o.precio,
    horaCierre: hora(), fechaCierre: hoy(), cerradoPor: currentUser
  });
  guardarOrden(updated).then(function(){ cerrarModal(); });
}

function cancelarOrden(id) {
  if (!confirm("¿Cancelar esta orden?")) return;
  eliminarOrden(id);
}

// ── RENDER PENDIENTES ────────────────────────────────────────
function renderPendientes() {
  var lista = ordenes.filter(function(o){ return o.estado==="pendiente"; })
                     .sort(function(a,b){ return b.id-a.id; });
  var c = document.getElementById("tabla-pend");
  if (!c) return;
  if (!lista.length) { c.innerHTML='<div class="empty">No hay órdenes pendientes</div>'; return; }
  var isAdmin = currentUser==="admin";
  var h = '<table><thead><tr><th>#</th><th>Hora</th><th>Placa</th><th>Vehículo</th><th>Servicio</th><th>Precio</th><th>Por</th><th>Acciones</th></tr></thead><tbody>';
  lista.forEach(function(o) {
    h += '<tr><td style="font-size:12px;color:var(--muted)">#'+o.num+'</td><td>'+o.horaApertura+'</td><td><strong>'+o.placa+'</strong></td><td style="font-size:12px;color:var(--muted)">'+o.tipo+'</td><td>'+o.servicio+'</td><td style="font-family:monospace">'+fmt(o.precio)+'</td><td><span class="badge '+(o.creadoPor==="admin"?"badge-admin":"badge-op")+'">'+o.creadoPor+'</span></td><td><div class="td-actions"><button class="btn btn-green" onclick="abrirModal(\''+o.id+'\')">Cobrar</button>'+(isAdmin?'<button class="btn btn-red" onclick="cancelarOrden(\''+o.id+'\')">Cancelar</button>':'')+'</div></td></tr>';
  });
  h += '</tbody></table>';
  c.innerHTML = h;
  updateBadge();
}

// ── RENDER CERRADAS ──────────────────────────────────────────
function renderCerradas() {
  document.getElementById("fecha-cerradas").textContent = fmtF(histFecha);
  var lista = ordenes.filter(function(o){ return o.estado==="cerrada" && o.fechaCierre===histFecha; })
                     .sort(function(a,b){ return b.id-a.id; });
  var c = document.getElementById("tabla-cerradas");
  if (!c) return;
  if (!lista.length) { c.innerHTML='<div class="empty">Sin órdenes cerradas para esta fecha</div>'; return; }
  var h = '<table><thead><tr><th>#</th><th>Cierre</th><th>Placa</th><th>Servicio</th><th>Total</th><th>Pago</th><th>Cerró</th></tr></thead><tbody>';
  lista.forEach(function(o) {
    h += '<tr><td style="font-size:12px;color:var(--muted)">#'+o.num+'</td><td>'+(o.horaCierre||"")+'</td><td><strong>'+o.placa+'</strong></td><td>'+o.servicio+'</td><td style="font-family:monospace">'+fmt(o.precio)+'</td><td>'+o.metodoPago+'</td><td><span class="badge '+(o.cerradoPor==="admin"?"badge-admin":"badge-op")+'">'+(o.cerradoPor||"")+'</span></td></tr>';
  });
  var total = lista.reduce(function(a,o){ return a+o.precio; }, 0);
  h += '<tr class="total-row"><td colspan="4" style="text-align:right;padding-right:12px">Total</td><td>'+fmt(total)+'</td><td colspan="2"></td></tr></tbody></table>';
  c.innerHTML = h;
}

function cambiarDia(d) {
  var dt = new Date(histFecha+"T12:00:00");
  dt.setDate(dt.getDate()+d);
  histFecha = dt.toISOString().slice(0,10);
  renderCerradas();
}

// ── RENDER REPORTE ───────────────────────────────────────────
function renderReporte() {
  document.getElementById("fecha-reporte").textContent = fmtF(repFecha);
  var lista    = ordenes.filter(function(o){ return o.estado==="cerrada" && o.fechaCierre===repFecha; });
  var total    = lista.reduce(function(a,o){ return a+o.precio; }, 0);
  var efectivo = lista.filter(function(o){ return o.metodoPago==="Efectivo"; }).reduce(function(a,o){ return a+o.precio; }, 0);
  document.getElementById("metricas-rep").innerHTML =
    '<div class="metric"><div class="metric-label">Motos atendidas</div><div class="metric-val">'+lista.length+'</div></div>'+
    '<div class="metric"><div class="metric-label">Total del día</div><div class="metric-val green">'+fmt(total)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Efectivo</div><div class="metric-val">'+fmt(efectivo)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Digital</div><div class="metric-val">'+fmt(total-efectivo)+'</div></div>';
  var c = document.getElementById("tabla-rep");
  if (!lista.length) { c.innerHTML='<div class="empty">Sin ventas para esta fecha</div>'; return; }
  var h = '<table><thead><tr><th>#</th><th>Placa</th><th>Servicio</th><th>Total</th><th>Pago</th><th>Cierre</th><th>Atendió</th></tr></thead><tbody>';
  lista.sort(function(a,b){ return b.id-a.id; }).forEach(function(o) {
    h += '<tr><td style="font-size:12px;color:var(--muted)">#'+o.num+'</td><td><strong>'+o.placa+'</strong></td><td>'+o.servicio+'</td><td style="font-family:monospace">'+fmt(o.precio)+'</td><td>'+o.metodoPago+'</td><td>'+(o.horaCierre||"")+'</td><td><span class="badge '+(o.cerradoPor==="admin"?"badge-admin":"badge-op")+'">'+(o.cerradoPor||"")+'</span></td></tr>';
  });
  h += '<tr class="total-row"><td colspan="3" style="text-align:right;padding-right:12px">Total</td><td>'+fmt(total)+'</td><td colspan="3"></td></tr></tbody></table>';
  c.innerHTML = h;
}

function cambiarDiaRep(d) {
  var dt = new Date(repFecha+"T12:00:00");
  dt.setDate(dt.getDate()+d);
  repFecha = dt.toISOString().slice(0,10);
  renderReporte();
}

// ── CONFIG ───────────────────────────────────────────────────
function renderConfig() {
  var h = "";
  servicios.forEach(function(s,i) {
    h += '<div class="config-row"><div class="config-name">'+s.nombre+'</div><div class="field" style="margin:0"><input type="number" value="'+s.precio+'" style="width:110px" onchange="servicios['+i+'].precio=+this.value;guardarServicios()"></div><button class="btn btn-red" onclick="delSrv(\''+s.id+'\')">Eliminar</button></div>';
  });
  document.getElementById("lista-srvs").innerHTML = h || '<p style="color:var(--muted);font-size:14px">Sin servicios.</p>';
  document.getElementById("pw-admin").value = "";
  document.getElementById("pw-op").value    = "";
}

function addSrv() {
  var n = document.getElementById("c-nombre").value.trim();
  var p = parseInt(document.getElementById("c-precio").value) || 0;
  if (!n||!p) { alert("Completa nombre y precio"); return; }
  servicios.push({id:"s"+Date.now(),nombre:n,precio:p});
  guardarServicios().then(function(){ poblarSelect(); renderConfig(); });
  document.getElementById("c-nombre").value = "";
  document.getElementById("c-precio").value = "";
}

function delSrv(id) {
  if (!confirm("¿Eliminar este servicio?")) return;
  servicios = servicios.filter(function(s){ return s.id!==id; });
  guardarServicios().then(function(){ poblarSelect(); renderConfig(); });
}

function guardarClaves() {
  var pa = document.getElementById("pw-admin").value.trim();
  var po = document.getElementById("pw-op").value.trim();
  if (!pa&&!po) { alert("Escribe al menos una contraseña"); return; }
  if (pa) authCfg.admin    = pa;
  if (po) authCfg.operario = po;
  guardarAuth().then(function(){ alert("Contraseñas actualizadas."); });
}

// ── ENTER EN LOGIN ───────────────────────────────────────────
document.getElementById("l-pass").addEventListener("keydown", function(e) {
  if (e.key==="Enter") doLogin();
});
</script>
</body>
